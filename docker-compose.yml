services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: studybud
      POSTGRES_USER: studybud
      POSTGRES_PASSWORD: studybud
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studybud -d studybud"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn studybud.wsgi:application --bind 0.0.0.0:8000"
    environment:
      DJANGO_SECRET_KEY: unsafe-docker-dev-key-change-before-production
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
      DJANGO_CSRF_TRUSTED_ORIGINS: http://localhost:8000,http://127.0.0.1:8000
      DATABASE_URL: postgres://studybud:studybud@db:5432/studybud
      CORS_ALLOW_ALL_ORIGINS: "True"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
