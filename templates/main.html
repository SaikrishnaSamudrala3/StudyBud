<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="{% static 'styles/style.css' %}" />
    <title>StudyBuddy - Find study partners around the world!</title>
</head>

<body>

    {% include 'navbar.html' %}

    {% if messages %}
    <div class="messages" role="status" aria-live="polite">
        {% for message in messages %}
        <div class="message message--{{message.tags|default:'info'}}">
            <span>{{ message }}</span>
            <button class="message__close" type="button" aria-label="Dismiss message">&times;</button>
        </div>
        {% endfor %}
    </div>
    {% endif %}

    {% block content %}


    {% endblock %}

    <script src="{% static 'js/script.js' %}"></script>
</body>

</html>
